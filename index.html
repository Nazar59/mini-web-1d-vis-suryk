<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style0303.css">

<body> 
       <h1>Doučování</h1>
         <h2>Vítejte na našem doučování prosím vyplntě tento formulář, nabízíme individuální doučování pro tyto předměty:</h2>
         <ul>
            <li><a href="Matematika.html">Matematika</a></li>
            <li><a href="Fyzika.html">Fyzika</a></li>
            <li><a href="Chemie.html">Chemie</a></li>
            <li><a href="Biologie.html">Biologie</a></li>
            <li><a href="Anglický jazyk.html">Anglický jazyk</a></li>
         </ul>
<form>
    <label for="name"><b>Jméno</b>:</b></label>    <br>
        <input type="text" id="name" name="name"><br><br> 
    <label for="age"><b>Věk:</b></label> <br>
        <input type="number" id="age" name="age"><br><br>
    <label for="email"><b>Email:</b></label> <br>
        <input type="email" id="email" name="email"><br><br>
    <label><b>Pohlaví:</b></label> <br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Muž</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Žena</label><br><br>
    <label for="subject"><b>Předmět:</b></label> <br><br>
        <select id="subject" name="subject">
            <option value="math">Matematika</option>
            <option value="physics">Fyzika</option>
            <option value="chemistry">Chemie</option>
            <option value="biology">Biologie</option>
            <option value="english">Anglický jazyk</option>
        </select><br><br>
</form>  
  
  
    <button>Odeslat</button>
</body>
</html>
